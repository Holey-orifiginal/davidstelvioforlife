<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Voortgang bijwerken</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 40px;
      width: 100%;
      max-width: 440px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="number"] {
      width: 100%;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1rem;
      color: #1a1a2e;
      margin-bottom: 18px;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #c0392b;
    }

    .progress-preview {
      margin-bottom: 18px;
    }

    .progress-track {
      height: 14px;
      background: #eee;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c0392b, #e74c3c);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-info {
      font-size: 0.82rem;
      color: #555;
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
    }

    button {
      width: 100%;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #a93226; }
    button:disabled { background: #aaa; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error   { background: #f8d7da; color: #721c24; display: block; }

    .current-value {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 22px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .current-value span { font-weight: 700; color: #1a1a2e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Voortgang bijwerken</h1>
    <p class="subtitle">Stelvio For Life – opgehaald bedrag aanpassen</p>

    <div class="current-value" id="currentValue">Huidig bedrag laden…</div>

    <label for="adminKey">Admin sleutel</label>
    <input type="password" id="adminKey" placeholder="Voer de admin sleutel in" autocomplete="current-password" />

    <label for="raisedAmount">Opgehaald bedrag (€)</label>
    <input type="number" id="raisedAmount" min="0" max="9999" step="1" placeholder="Bijv. 750" />

    <div class="progress-preview">
      <label>Voorbeeld voortgang</label>
      <div class="progress-track">
        <div class="progress-fill" id="previewFill" style="width: 0%;"></div>
      </div>
      <div class="progress-info">
        <span id="previewPct">0%</span>
        <span>doel: € 1.533</span>
      </div>
    </div>

    <button id="saveBtn" onclick="save()">Opslaan</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const GOAL = 1533

    async function loadCurrent() {
      try {
        const res = await fetch('/api/progress')
        if (!res.ok) throw new Error()
        const data = await res.json()
        document.getElementById('currentValue').innerHTML =
          'Huidig bedrag: <span>€ ' + data.raised.toLocaleString('nl-NL') + '</span> (' + data.pct + '%)'
        document.getElementById('raisedAmount').value = data.raised
        updatePreview(data.raised)
      } catch {
        document.getElementById('currentValue').textContent = 'Kon huidig bedrag niet ophalen.'
      }
    }

    function updatePreview(val) {
      const pct = Math.min(Math.round((val / GOAL) * 100), 100)
      document.getElementById('previewFill').style.width = pct + '%'
      document.getElementById('previewPct').textContent = pct + '%'
    }

    document.getElementById('raisedAmount').addEventListener('input', function () {
      updatePreview(Number(this.value) || 0)
    })

    async function save() {
      const key = document.getElementById('adminKey').value.trim()
      const raised = Number(document.getElementById('raisedAmount').value)
      const btn = document.getElementById('saveBtn')
      const msg = document.getElementById('msg')

      msg.className = 'msg'
      msg.textContent = ''

      if (!key) { showMsg('error', 'Voer de admin sleutel in.'); return }
      if (isNaN(raised) || raised < 0) { showMsg('error', 'Voer een geldig bedrag in.'); return }

      btn.disabled = true
      btn.textContent = 'Opslaan…'

      try {
        const res = await fetch('/api/progress', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
          body: JSON.stringify({ raised }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Onbekende fout')
        showMsg('success', 'Opgeslagen! Bedrag: € ' + data.raised.toLocaleString('nl-NL') + ' (' + data.pct + '%)')
        document.getElementById('currentValue').innerHTML =
          'Huidig bedrag: <span>€ ' + data.raised.toLocaleString('nl-NL') + '</span> (' + data.pct + '%)'
      } catch (e) {
        showMsg('error', 'Fout: ' + e.message)
      } finally {
        btn.disabled = false
        btn.textContent = 'Opslaan'
      }
    }

    function showMsg(type, text) {
      const msg = document.getElementById('msg')
      msg.className = 'msg ' + type
      msg.textContent = text
    }

    loadCurrent()
  </script>
</body>
</html>
